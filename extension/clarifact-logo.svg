<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Transparent background — no rect fill -->

  <!-- Bold C arc: a white partial circle -->
  <path
    d="M 78 28
       A 38 38 0 1 0 78 72"
    fill="none"
    stroke="#F0F2F5"
    stroke-width="13"
    stroke-linecap="round"
  />

  <!-- Orange badge circle (top-right of C) -->
  <circle cx="76" cy="24" r="16" fill="#E87020"/>

  <!-- White checkmark inside the badge -->
  <polyline
    points="68,24 74,30 86,18"
    fill="none"
    stroke="white"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
